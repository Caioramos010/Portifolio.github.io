version: '3.8'

services:
  portfolio:
    build: .
    ports:
      - "3000:80"
    restart: unless-stopped
    container_name: portfolio-app

  # Opcional: serviço de desenvolvimento
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    container_name: portfolio-dev
    profiles:
      - dev
